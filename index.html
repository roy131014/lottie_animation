<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottie Animation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    overflow:hidden;
}

#lottie{
    width:400px;
    height:400px;
}
</style>
</head>
<body>

<div id="lottie"></div>

<script>
window.addEventListener("load", () => {
    lottie.loadAnimation({
        container: document.getElementById("lottie"),
        renderer: "canvas",
        loop: true,
        autoplay: true,
        path: "animations/animation.json"
    });
});
</script>

</body>
</html>
